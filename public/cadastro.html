<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CineBook Tracker</title>
    <link rel="stylesheet" href="estilo/style.css">
</head>
<body>
    <h1>CineBook Tracker</h1>
    <form id="cadastroForm">
        <h2>Criar Nova Conta</h2>
        <input type="text" id="nome" required placeholder="Seu Nome Completo">
        <input type="email" id="email" required placeholder="Seu E-mail">
        <input type="password" id="senha" required placeholder="Sua Senha">
        <button type="submit">Cadastrar</button>
        <p style="text-align: center; margin-top: 15px;">Já tem conta? <a href="login.html">Faça Login</a></p>
    </form>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede o recarregamento padrão da página

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch('/api/auth/cadastro', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ nome, email, senha })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Exibe a mensagem de erro exata gerada pelo back-end
                    alert(data.error || 'Erro ao realizar o cadastro.');
                } else {
                    alert('Cadastro realizado com sucesso! Redirecionando para o login...');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Erro na requisição:', error);
                alert('Não foi possível conectar ao servidor. Tente novamente mais tarde.');
            }
        });
    </script>
</body>
</html>
