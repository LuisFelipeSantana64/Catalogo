<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBook Tracker - Suas Reviews</title>
    <link rel="stylesheet" href="estilo/style.css">
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background-color: #f4f4f4;">
        <h1>CineBook Tracker</h1>
        <div>
            <span id="boasVindas">Olá, Visitante!</span>
            <button id="btnLogoff" style="margin-left: 15px; background-color: #d9534f; color: white; border: none; padding: 5px 10px; cursor: pointer;">Sair</button>
        </div>
    </header>

    <main style="max-width: 800px; margin: 30px auto; padding: 0 20px;">
        <form action="/salvar" method="POST" id="reviewForm" style="margin-bottom: 40px; padding: 20px; border: 1px solid #ddd; background: #fff;">
            <h2>Nova Review (Filme ou Livro)</h2>
            
            <input type="hidden" name="usuario_id" id="formUsuarioId">

            <input type="text" name="nome" required placeholder="Nome do Filme ou Livro" style="width: 100%; margin-bottom: 15px; padding: 8px;">
            
            <select name="categoria" required style="width: 100%; margin-bottom: 15px; padding: 8px;">
                <option value="Filme">Filme</option>
                <option value="Livro">Livro</option>
            </select>

            <input type="number" name="preco_nota" required placeholder="Nota ou Preço Pago" style="width: 100%; margin-bottom: 15px; padding: 8px;">
            <textarea name="descricao" placeholder="Sua opinião/Review sobre ele..." style="width: 100%; margin-bottom: 15px; padding: 8px; height: 100px;"></textarea>
            
            <button type="submit" style="width: 100%; padding: 10px; background-color: #0275d8; color: white; border: none; cursor: pointer;">Salvar Review</button>
        </form>

        <h2>Catálogo de Reviews</h2>
        <div id="containerReviews">Carregando catálogo...</div>
    </main>

    <script>
        // 1. SEGURANÇA: Bloqueia a página se o usuário não estiver logado
        const idLogado = localStorage.getItem('usuarioId');
        const nomeLogado = localStorage.getItem('usuarioNome');

        if (!idLogado) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('boasVindas').innerText = `Olá, ${nomeLogado}!`;
            document.getElementById('formUsuarioId').value = idLogado;
        }

        // 2. FUNÇÃO: Buscar reviews e renderizar na tela com o nome do criador
        function carregarReviews() {
            fetch('/api/itens', {
                headers: { 'x-user-id': idLogado || 0 }
            })
            .then(res => res.json())
            .then(itens => {
                const container = document.getElementById('containerReviews');
                container.innerHTML = '';

                if(itens.length === 0) {
                    container.innerHTML = '<p>Nenhuma review cadastrada ainda.</p>';
                    return;
                }

                itens.forEach(item => {
                    const card = document.createElement('div');
                    card.style = "border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; background: #fff; position: relative;";
                    
                    // Monta a estrutura HTML da review exibindo a variável item.nome_usuario obtida com o JOIN
                    card.innerHTML = `
                        <h3>${item.nome} <span style="font-size: 12px; color: #777;">(${item.categoria})</span></h3>
                        <p>${item.descricao || 'Sem descrição.'}</p>
                        <p style="font-size: 13px; color: #555; margin-top: 10px;">
                            <strong>Postado por:</strong> ${item.nome_usuario} | 
                            <strong>Nota/Preço:</strong> ${item.preco_nota}
                        </p>
                    `;

                    // Se a review pertencer ao usuário atualmente logado, cria o botão de apagar
                    if (item.e_do_usuario) {
                        const btnDeletar = document.createElement('button');
                        btnDeletar.innerText = 'Excluir';
                        btnDeletar.style = "position: absolute; top: 15px; right: 15px; background: red; color: white; border: none; padding: 5px; cursor: pointer;";
                        btnDeletar.onclick = () => deletarReview(item.id);
                        card.appendChild(btnDeletar);
                    }

                    container.appendChild(card);
                });
            })
            .catch(err => {
                console.error("Erro ao carregar catálogo:", err);
            });
        }

        // 3. FUNÇÃO: Deletar Review
        function deletarReview(id) {
            if(confirm('Tem certeza que deseja apagar sua review?')) {
                fetch(`/api/itens/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(() => {
                    carregarReviews(); // Atualiza a página tirando o card deletado
                });
            }
        }

        // 4. LOGOFF: Limpa a sessão
        document.getElementById('btnLogoff').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        // Inicia a listagem ao abrir a tela
        carregarReviews();
    </script>
</body>
</html>
