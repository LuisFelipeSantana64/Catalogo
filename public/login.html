<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CineBook Tracker</title>
    <link rel="stylesheet" href="estilo/style.css">
</head>
<body>
    <h1>CineBook Tracker</h1>
    <form id="loginForm">
        <h2>Acessar Minha Conta</h2>
        <input type="email" id="email" required placeholder="Seu E-mail">
        <input type="password" id="senha" required placeholder="Sua Senha">
        <button type="submit">Entrar</button>
        <p style="text-align: center; margin-top: 15px;">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.error || 'Erro ao fazer login.');
                } else {
                    // SALVA AS INFORMAÇÕES DO USUÁRIO NA MEMÓRIA DO NAVEGADOR
                    localStorage.setItem('usuarioId', data.user.id);
                    localStorage.setItem('usuarioNome', data.user.nome);

                    alert(`Bem-vindo de volta, ${data.user.nome}!`);
                    window.location.href = '/'; // Vai para a tela principal
                }
            } catch (error) {
                alert('Erro ao conectar com o servidor.');
            }
        });
    </script>
</body>
</html>
